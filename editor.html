function openInstruction() {
    const modal = $('instructionModal');
    const body = $('instructionBody');
    if (!modal || !body) return;
    modal.classList.add('visible');
    if (!body.dataset.loaded) {
        fetch('instr_editor.html')
            .then(r => r.text())
            .then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                body.innerHTML = doc.body.innerHTML;
                body.dataset.loaded = '1';
            })
            .catch(() => { body.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,100,100,0.8);">Ошибка загрузки инструкции</div>'; });
    }
}

function closeInstruction() {
    const modal = $('instructionModal');

}

const showToast = (text, type = 'info', duration = 2200) => {
    const el = $('toast');
    el.textContent = text;
    el.className = '';
    el.classList.add(type || 'info');
    if (toastTimer) clearTimeout(toastTimer);
    el.classList.add('show');

};

async function callYcFunction(action, params = {}, bodyData = null) {
    const url = new URL(YC_FUNCTION_URL);
    url.searchParams.set('action', action);
    if (ADMIN_TOKEN) {
        url.searchParams.set('p', 'admin');
        url.searchParams.set('admin_token', ADMIN_TOKEN);
    } else {
        url.searchParams.set('p', TG_ACTIVE ? 'tg' : 'vk');
    }
    url.searchParams.set('id', window.USER_ID);
    if (TG_ACTIVE) {
        url.searchParams.set('tg_init_data', Telegram.WebApp.initData);
    }
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    
    const options = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    };
    
    if (bodyData !== null) {
        options.body = JSON.stringify(bodyData);
    }
    
    const response = await fetch(url.toString(), options);
    
    if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
    }
    
    return await response.json();
}

function encodeUserInfo() {
    try {
        if (TG_ACTIVE && window.tgUser) {
            const user = window.tgUser;
            const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
            const userInfoStr = 'tg:' + [user.id, fullName, user.username || ''].join(',');
            return btoa(encodeURIComponent(userInfoStr));
        }
        if (typeof vkBridge !== 'undefined' && window.vkUser) {
            const user = window.vkUser;
            const city = user.city?.title || 'не указан';

            return btoa(encodeURIComponent(userInfoStr));
        }
    } catch (e) {}
    return null;
}

    const s = isEnd ? 34 : 40, c = s / 2;

    const txtStroke = hasComm ? '#FF3B30' : '#000000';

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">

        ${isCurr ? `<circle cx="${c}" cy="${c}" r="${r + 3}" fill="none" stroke="#00FF00" stroke-width="2.5" opacity="0.9"/>` : ''}

}

function getArrowEndSvg(col, az) {
    const s = 30, c = s / 2;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
        <g transform="rotate(${az},${c},${c})">
            <polygon points="${c},3 ${c+6},${c+6} ${c},${c+1} ${c-6},${c+6}" fill="${col}" stroke="#000000" stroke-width="1" opacity="0.9"/>
        </g>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}
const getUserLocSvg = () => 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="#007AFF" stroke="white" stroke-width="2.5"/><circle cx="8" cy="8" r="7.5" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.3"/></svg>`);
function calcAzimuth(p1, p2) {
    if (!p1 || !p2) return 0;
    const [la1, lo1] = p1.map(v => v * Math.PI / 180);
    const [la2, lo2] = p2.map(v => v * Math.PI / 180);
    const y = Math.sin(lo2 - lo1) * Math.cos(la2);
    const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(lo2 - lo1);
    return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
}
const serializePoints = () => JSON.stringify(points.map(p => ({ id: p.id, color: p.color, pts: p.pts, cmd: p.cmd, comm: p.comm, info: p.info })));

function formatJsonWithPts(data) {
    const items = data.map(p => {
        const ptsStr = JSON.stringify(p.pts);
        const infoStr = p.info && p.info.length ? `,\n    "info": ${JSON.stringify(p.info)}` : '';

    return '[\n' + items.join(',\n') + '\n]';
}

function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function countNodeRoutes(node) {
    let c = node.routes.length;
    for (const f of Object.values(node.folders)) c += countNodeRoutes(f);
    return c;
}

function buildRouteTree() {
    const root = { folders: {}, routes: [] };
    for (const route of settingsRouteFiles) {
        const key = typeof route === 'string' ? route : (route.m || '');
        const fullPath = typeof route === 'string' ? route : getRouteName(route);
        const parts = fullPath.split('/').map(s => s.trim()).filter(Boolean);
        const leafName = parts.pop() || fullPath;
        let node = root;
        for (const part of parts) {
            if (!node.folders[part]) node.folders[part] = { folders: {}, routes: [] };
            node = node.folders[part];
        }
        node.routes.push({ key, name: leafName, fullPath });
    }
    return root;
}

function renderTreeLevel(node, pathPrefix, container) {
    const frag = document.createDocumentFragment();
    for (const [name, sub] of Object.entries(node.folders).sort(([a], [b]) => a.localeCompare(b))) {
        const folderPath = pathPrefix ? pathPrefix + '/' + name : name;
        const total = countNodeRoutes(sub);
        const isExpanded = _expandedFolders.has(folderPath);

        const el = document.createElement('div');
        el.className = 'category-folder';
        el.setAttribute('data-path', folderPath);

        const header = document.createElement('div');
        header.className = 'category-header' + (isExpanded ? ' expanded' : '');
        header.innerHTML = `
            <span class="category-icon">${isExpanded ? '📂' : '📁'}</span>
            <span class="category-name">${name}</span>
            <span class="category-count">${total}</span>
        `;
        header.addEventListener('click', () => {
            if (_expandedFolders.has(folderPath)) _expandedFolders.delete(folderPath);
            else _expandedFolders.add(folderPath);
            renderSettingsFileList();
        });
        el.appendChild(header);

        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
            e.preventDefault(); el.classList.remove('drag-over');
            const routeKey = e.dataTransfer.getData('text/plain');
            if (routeKey) moveRouteToFolder(routeKey, folderPath);
        });

        frag.appendChild(el);

        if (isExpanded) {
            const childWrap = document.createElement('div');
            childWrap.style.cssText = 'padding-left:16px;display:flex;flex-direction:column;gap:6px;';
            renderTreeLevel(sub, folderPath, childWrap);
            frag.appendChild(childWrap);
        }
    }

    for (const route of node.routes) {
        const isActive = route.key === curRoute;
        const el = document.createElement('button');
        el.className = 'route-item' + (isActive ? ' active' : '');
        if (isActive) el.style.cssText = 'background:rgba(48,209,88,0.2);border-color:rgba(48,209,88,0.4);';
        el.draggable = true;
        el.setAttribute('data-key', route.key);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'route-name';
        nameSpan.textContent = route.name;
        el.appendChild(nameSpan);

        const gear = document.createElement('span');
        gear.className = 'route-info-btn';
        gear.textContent = '⚙️';
        gear.style.fontStyle = 'normal';
        gear.style.fontWeight = '400';
        gear.addEventListener('click', e => {
            e.stopPropagation();
            openRouteSettings(route.key);
        });
        el.appendChild(gear);

        el.addEventListener('click', () => {
            if (el.classList.contains('loading')) return;
            el.classList.add('loading');
            loadRoute(route.key).then(() => renderSettingsFileList());
        });
        el.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', route.key);
            el.classList.add('dragging');
        });
        el.addEventListener('dragend', () => {
            el.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(d => d.classList.remove('drag-over'));
        });
        frag.appendChild(el);
    }
    container.appendChild(frag);
}

const _dragAutoScroll = (e, el, speed = 12) => {
    const rect = el.getBoundingClientRect();
    const threshold = 40;
    const distTop = e.clientY - rect.top;
    const distBot = rect.bottom - e.clientY;
    if (distTop < threshold) el.scrollTop -= (threshold - distTop) * speed / threshold;
    else if (distBot < threshold) el.scrollTop += (threshold - distBot) * speed / threshold;
};

const renderSettingsFileList = () => {
    const list = $('routesList');
    if (!list) return;
    list.innerHTML = '';
    if (settingsRouteFiles.length === 0 && _emptyFolders.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#8b8f99;font-size:15px;">У вас пока нет маршрутов.<br>Создайте первый маршрут.</div>';
        $('settingsTitle').textContent = `${window.USER_NAME || window.USER_ID} - маршрутов:0`;
        return;
    }
    const tree = buildRouteTree();
    renderTreeLevel(tree, '', list);
    const existingPaths = new Set();
    const collectPaths = (node, prefix) => {
        for (const [name, child] of Object.entries(node.folders)) {
            const fp = prefix ? prefix + '/' + name : name;
            existingPaths.add(fp);
            collectPaths(child, fp);
        }
    };
    collectPaths(tree, '');
    for (const folderName of _emptyFolders) {
        if (existingPaths.has(folderName)) continue;
        const fp = folderName;
        const el = document.createElement('div');
        el.className = 'category-folder';
        el.setAttribute('data-path', fp);
        const header = document.createElement('div');
        header.className = 'category-header';
        header.style.opacity = '0.6';
        header.style.cursor = 'default';
        header.innerHTML = `
            <span class="category-icon">📁</span>
            <span class="category-name">${folderName}</span>
            <span style="font-size:12px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:8px;">пусто</span>
        `;
        el.appendChild(header);
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
            e.preventDefault(); el.classList.remove('drag-over');
            const routeKey = e.dataTransfer.getData('text/plain');
            if (routeKey) moveRouteToFolder(routeKey, fp);
        });
        list.appendChild(el);
    }
    const userId = window.USER_ID;
    $('settingsTitle').textContent = `${window.USER_NAME || userId} - маршрутов:${settingsRouteFiles.length}`;
    if (!list.dataset.dragScroll) {
        list.dataset.dragScroll = '1';
        list.addEventListener('dragover', e => _dragAutoScroll(e, list));
    }
    if (!list.dataset.touchDrag) {
        list.dataset.touchDrag = '1';
        let touchDragKey = null, touchDragEl = null;
        list.addEventListener('touchstart', e => {
            const item = e.target.closest('.route-item');
            if (!item) return;
            touchDragKey = item.dataset.key;
            touchDragEl = item;
            item.classList.add('dragging');
        }, { passive: true });
        list.addEventListener('touchmove', e => {
            if (!touchDragKey) return;
            e.preventDefault();
            const touch = e.touches[0];
            if (touchDragEl) touchDragEl.style.display = 'none';
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (touchDragEl) touchDragEl.style.display = '';
            const folder = target?.closest('.category-folder');
            document.querySelectorAll('.category-folder.drag-over').forEach(el => {
                if (el !== folder) el.classList.remove('drag-over');
            });
            if (folder) folder.classList.add('drag-over');
            const rect = list.getBoundingClientRect();
            const th = 40;
            const dt = touch.clientY - rect.top;
            const db = rect.bottom - touch.clientY;
            if (dt < th) list.scrollTop -= (th - dt) * 12 / th;
            else if (db < th) list.scrollTop += (th - db) * 12 / th;
        }, { passive: false });
        list.addEventListener('touchend', () => {
            if (!touchDragKey) return;
            if (touchDragEl) touchDragEl.classList.remove('dragging');
            const folder = document.querySelector('.category-folder.drag-over');
            if (folder) {
                const fp = folder.dataset.path;
                if (fp) moveRouteToFolder(touchDragKey, fp);
                folder.classList.remove('drag-over');
            }
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            touchDragKey = null;
            touchDragEl = null;
        }, { passive: true });
    }
};

async function playText(text, voice_type = 'command', btn = null) {
    if (!text || !text.trim()) return;
    if (btn) btn.classList.add('loading');
    try {
        const resp = await fetch(TTS_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ batches: [{ voice_type, texts: [text] }] })
        });
        const data = await resp.json();
        if (data.audios && data.audios[text]) {
            const binaryStr = atob(data.audios[text]);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            const blob = new Blob([bytes], { type: 'audio/mp3' });
            const audio = new Audio();
            audio.src = URL.createObjectURL(blob);
            await audio.play().catch(() => {});
        }
    } catch (e) {
        console.warn('TTS error:', e);
    } finally {
        if (btn) btn.classList.remove('loading');
    }
}

function addP(coords, data = null, silent = false) {
    const ptsData = data?.pts || [coords];
    const p = { 
        id: data?.id || (points.length + 1), 
        color: data?.color || 'Gold', 
        cmd: data?.cmd || '', 
        comm: data?.comm || '', 
        pts: ptsData,
        info: data?.info || [],
        infoPlacemarks: [],
        pm: new ymaps.Placemark(coords, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [40,40], iconImageOffset: [-20,-20], zIndex: 1000 }), 
        line: new ymaps.Polyline(ptsData, {}, { strokeWidth: 4, strokeOpacity: 1, zIndex: 852, interactive: false }), 
        lineOutline: new ymaps.Polyline(ptsData, {}, { strokeWidth: 6, strokeOpacity: 1, zIndex: 850, interactive: false }), 
        lineAccent: null 
    };
    p.line.options.set('strokeColor', COLORS[p.color].hex);
    p.lineOutline.options.set('strokeColor', '#000000');
    
    p.pm.geometry.events.add('change', () => { 
        const nc = p.pm.geometry.getCoordinates(), pts = p.line.geometry.getCoordinates(); 
        if(pts.length) { 
            pts[0] = nc; 
            p.line.geometry.setCoordinates(pts); 
            p.lineOutline.geometry.setCoordinates(pts);
            if(p.lineAccent) p.lineAccent.geometry.setCoordinates(pts);
        } 
    });
    p.line.geometry.events.add('change', () => {
        const coords = p.line.geometry.getCoordinates();
        p.pts = coords.map(pt => [f6(pt[0]), f6(pt[1])]);
        p.lineOutline.geometry.setCoordinates(coords);
        if(p.lineAccent) p.lineAccent.geometry.setCoordinates(coords);
        if(isDrawing && coords.length > 0) {
            const pmCoords = p.pm.geometry.getCoordinates();
            if(Math.abs(pmCoords[0] - coords[0][0]) > 0.000001 || Math.abs(pmCoords[1] - coords[0][1]) > 0.000001) {
                p.pm.geometry.setCoordinates(coords[0]);
            }
        }
        if(isDrawing && p.pts.length > 1) { $('addText').textContent = "Завершить рисование пути"; }
        updI(p);
    });
    p.pm.events.add('click', () => { setActivePoint(p, true); if(!isAdd && !isDrawing) openEditPointModal(p); });
    map.geoObjects.add(p.lineOutline);
    map.geoObjects.add(p.pm);
    map.geoObjects.add(p.line);
    points.push(p);
    updI(p);
    if (!silent) updateSaveState();
    return p;
}

function renderInfoPlacemarks(p) {
    clearInfoPlacemarks(p);

    p.info.forEach((inf, idx) => {
        const coords = [inf.lat, inf.lon];
        const img = inf.image || '';
        const pm = new ymaps.Placemark(coords, {}, {
            iconLayout: 'default#image',
            iconImageHref: `znaki/${img}`,
            iconImageSize: [32, 32],
            iconImageOffset: [-16, -16],
            zIndex: 900
        });
        pm.events.add('click', () => editInfoPoint(p, idx));
        map.geoObjects.add(pm);
        p.infoPlacemarks.push(pm);
    });
}

function clearInfoPlacemarks(p) {
    if (p.infoPlacemarks) {
        p.infoPlacemarks.forEach(m => map.geoObjects.remove(m));

function toggleGpsMode() {
    if (!navigator.geolocation || !(isAdd || isDrawing)) return;
    navigator.geolocation.getCurrentPosition(
        (position) => {
            const coords = [position.coords.latitude, position.coords.longitude];
            if (isAdd && tempNewPointData) {

const updI = p => { 
    const isCurrent = p === activePoint;

    p.pm.options.set('iconImageHref', getNavIconSvg(COLORS[p.color].hex, p.id, az, false, isCurrent, hasComm));
    
    if (p.pts?.length >= 2) {
        if (isCurrent) {
            if (!p.lineAccent) {
                p.lineAccent = new ymaps.Polyline(p.pts, {}, { strokeWidth: 6, strokeOpacity: 1, zIndex: 1998, interactive: false });
                p.lineAccent.options.set('strokeColor', '#A4E84A');
                map.geoObjects.add(p.lineAccent);
            } else {
                p.lineAccent.geometry.setCoordinates(p.pts);
            }
        } else {
            if (p.lineAccent) {
                map.geoObjects.remove(p.lineAccent);
                p.lineAccent = null;
            }
        }

        if (p.lineAccent) {

    }
};

async function saveGist() {
    if(!curRoute) return;
    const btn = $('saveInListBtn');
    const topSaveBtn = $('saveStateBtn');
    btn.classList.add('loading');
    if (topSaveBtn) { topSaveBtn.disabled = true; topSaveBtn.textContent = 'Сохраняем...'; }
    try {
        const data = points.map(p => ({ id: p.id, color: p.color, pts: p.pts, cmd: p.cmd, comm: p.comm, info: p.info }));
        const result = await callYcFunction('save', { m: curRoute }, { data });
        if(result && !result.error) {
            lastSavedSnapshot = serializePoints();
            btn.classList.remove('loading');
            btn.classList.add('saved');
            if (topSaveBtn) topSaveBtn.textContent = 'Сохранено';
            setTimeout(() => {
                btn.classList.remove('saved');
                updateSaveState();
            }, 900);
        } else {
            btn.classList.remove('loading');
            if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
            showToast(result?.error || 'Ошибка сохранения', 'error');
        }
    } catch(e) {
        btn.classList.remove('loading');
        if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
        showToast('Ошибка: ' + e.message, 'error');
    }
}

function openZnakiSelector() {
    const grid = $('znakiGrid');
    grid.innerHTML = '';
    ZNAKI.forEach(f => {
        const el = document.createElement('div');
        el.className = 'znaki-item';
        el.innerHTML = `<img class="znaki-thumb" src="znaki/${f}" alt="${f}"><span class="znaki-name">${f}</span>`;
        el.onclick = () => selectZnak(f);
        grid.appendChild(el);
    });
    $('znakiModal').classList.add('visible');
}

function selectZnak(file) {
    pendingInfoImage = file;
    isAddingInfo = true;
    $('znakiModal').classList.remove('visible');
    $('addText').textContent = "Кликните на карте для установки знака";
    $('addMarkerBtn').classList.add('active');
    if (map && map.setCursor) map.setCursor('crosshair');
}
function closeZnakiSelector() {
    if (isAddingInfo) stopAddingInfo();
    $('znakiModal').classList.remove('visible');
}

window.createFolder = () => {
    const name = prompt('Введите название папки (можно с путём, например Город/Мещера):');
    if (!name || !name.trim()) return;
    _emptyFolders.push(name.trim());
    renderSettingsFileList();
    showToast('Папка создана', 'success');
};

window.shareRouteFromSettings = shareRouteFromSettings;

window.confirmDeletePoint = confirmDeletePoint;

window.copyShareLink = copyShareLink;

window.closeInstruction = closeInstruction;
window.closeZnakiSelector = closeZnakiSelector;
window.selectZnak = selectZnak;
</script>
